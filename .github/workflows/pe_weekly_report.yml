name: PE估值周报

on:
  # 每周一北京时间 8:00（UTC 0:00）
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  weekly_pe_report:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 运行PE周报
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: python pe_weekly_report.py
