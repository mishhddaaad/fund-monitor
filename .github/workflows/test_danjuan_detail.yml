name: 蛋卷数据详情测试

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 蛋卷API完整数据
        run: |
          python3 -c "
          import urllib.request, json
          url = 'https://danjuanfunds.com/djapi/index_eva/dj'
          req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
          resp = urllib.request.urlopen(req, timeout=15)
          data = json.loads(resp.read())
          items = data.get('data', {}).get('items', [])
          print(f'共返回 {len(items)} 个指数')
          print()
          # 找我们需要的5只
          targets = ['沪深300', '上证50', '中证红利', '标普500', '纳指100', '纳斯达克100']
          for item in items:
              name = item.get('name', '')
              for t in targets:
                  if t in name:
                      print(f'{name}:')
                      print(f'  PE: {item.get(\"pe\")}')
                      print(f'  PE百分位: {item.get(\"pe_percen\")}')
                      print(f'  估值判断: {item.get(\"valuation\")}')
                      print()
                      break
          "
