name: PE 数据源连通性测试

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 测试 akshare A股PE
        run: |
          pip install akshare -q
          python3 -c "
          import akshare as ak
          print('=== akshare 测试 ===')
          for idx in ['沪深300', '上证50']:
              try:
                  df = ak.stock_index_pe_lg(symbol=idx)
                  print(f'{idx}: PE={df.iloc[-1][\"滚动市盈率\"]:.2f}, 成功')
              except Exception as e:
                  print(f'{idx}: 失败 - {e}')
          "

      - name: 测试蛋卷基金 API (中证红利+标普500+纳指100)
        run: |
          python3 -c "
          import urllib.request, json
          print('=== 蛋卷API测试 ===')
          indices = {
              '中证红利': 'SH000922',
              '标普500': 'SPX',
              '纳指100': 'NDX',
          }
          for name, code in indices.items():
              try:
                  url = f'https://danjuanfunds.com/djapi/index_eva/dj'
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  resp = urllib.request.urlopen(req, timeout=15)
                  data = json.loads(resp.read())
                  print(f'{name}: 接口连通={\"items\" in str(data)}')
                  break  # 一个接口返回所有指数
              except Exception as e:
                  print(f'{name}: 失败 - {e}')
          "

      - name: 测试理杏仁 API
        run: |
          python3 -c "
          import urllib.request, json
          print('=== 理杏仁API测试 ===')
          try:
              url = 'https://www.lixinger.com/api/unionfund'
              req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
              resp = urllib.request.urlopen(req, timeout=15)
              print(f'连通: HTTP {resp.status}')
          except Exception as e:
              print(f'失败 - {e}')
          "
          echo '---测试完成---'
